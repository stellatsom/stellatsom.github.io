<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Worlde</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

</head>

<body>
    <div class="overlay hidden"> </div>

    <div id="modal" class="hidden">
        <div class="modalgrid">
            <div></div>
            <div style="text-align: center; color:#f6ccc0;  border-radius: 15%; margin-top: 7px;" class="bungee-regular2"> how to play</div>
            <div style="display: flex; align-items: center; justify-content: end;">
                <span id="close" class="bungee-regular2">x </span>
            </div>

        </div>
        <div class="modalContent1">
            <div class="modalColors">
                <div style="background-color: #8989b0; border-color: #8989b0;" class="color">
                    
                </div>
                <div style="background-color:  #d26b8e; border-color:#d26b8e" class="color">
                    
                </div> 
                <div style="background-color: #b3785e; border-color: #b3785e" class="color">
                    
                </div>
            </div>
            <div class="modalText bungee-regular3">
                <div>
                    The letter is in the correct position.
                </div>
                <div>
                    The letter is in the word, but in the wrong position.
                </div>
                <div>
                    The letter is not in the word.
                </div>
            </div>
        </div>

    </div>
    <div class="headergrid1">
        <div></div>

        <div class="headergrid2">

            <div></div>

            <div class="title">
                <h1 class="bungee-regular1">Wordle</h1>
            </div>

            <div id="helpButton">
                <img src="help2.png" style="width: 30px; height: 30px;">
            </div>

        </div>

    </div>

    <div id="board" class="bungee-regular1">

    </div>

    <div id="count">

    </div>

</body>
<script src="javascript.js"></script>

</html>
